include-directory = /home/mathieulp/.config/polybar/modules

[colors]
blue-gray = #fdfdfdfd
background = #bf242424
background-alt = #008B8B
foreground = #FFFFFF
primary = #008B8B
secondary = #42A5F5
alert = #EF5350
disabled = #B0BEC5
border-clr = #00ffffff


[bar/bar]
width = 100%
height = 20pt
radius = 0

monitor = eDP-1
; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 1

border-size = 1
border-color = ${colors.border}

padding-left = 0
padding-right = 1

module-margin = 1

separator = ""
separator-foreground = ${colors.disabled}

font-0 = JetBrains Mono:pixelsize=10;1
font-1 = FontAwesome:size=10;2
font-2 = Material Icons:size=10:3
font-4 = Roboto:size:12;4

modules-left = xworkspaces spotify pulseaudio-control-output
; modules-center = xwindow
modules-right =   brightness memory cpu systray battery powermenu weather date
cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
 wm-restack = i3

 [bar/bar2]
width = 100%
height = 20pt
radius = 0

monitor = HDMI-1
; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 1

border-size = 1
border-color = ${colors.border}

padding-left = 0
padding-right = 1

module-margin = 1

separator = ""
separator-foreground = ${colors.disabled}

font-0 = JetBrains Mono:pixelsize=10;1
font-1 = FontAwesome:size=10;2
font-2 = Material Icons:size=10:3
font-4 = Roboto:size:12;4

modules-left = xworkspaces spotify pulseaudio-control-output
; modules-center = xwindow
modules-right =   brightness memory cpu systray battery powermenu weather date
cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
 wm-restack = i3

[settings]
screenchange-reload = true
pseudo-transparency = true

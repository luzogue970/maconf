[module/spotify]
type = custom/script
interval = 1
exec = playerctl metadata --format "{{ artist }} - {{ title }}" -a
format = <label>
label = %{F#1DB954} %output:0:30:...%%{F-}
click-left = playerctl play-pause -a
click-right = playerctl next -a
click-middle = playerctl previous -a
scroll-up = playerctl volume 0.05+ -a
scroll-down = playerctl volume 0.05- -a

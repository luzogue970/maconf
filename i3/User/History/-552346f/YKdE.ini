[module/spotify]
type = custom/script
interval = 1
exec = playerctl metadata --format "{{ artist }} - {{ title }}" -a
format = <label>
label = %{F#1DB954} %output:0:30:...%%{F-}
click-left = playerctl play-pause -p spotify
click-right = playerctl next -p spotify
click-middle = playerctl previous -p spotify
scroll-up = playerctl volume 0.05+ -p spotify
scroll-down = playerctl volume 0.05- -p spotify

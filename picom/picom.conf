############################################
#              BACKEND & BASE             #
############################################
backend = "glx";
vsync = true;
refresh-rate = 0;
dbe = false;

mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;

############################################
#                CORNERS                   #
############################################
# corner-radius = 10;
# detect-rounded-corners = true;

############################################
#                 BLUR                     #
############################################
# Décommente ces 3 lignes si tu veux l’effet “glass”
blur-method = "dual_kawase";
blur-background = true;
blur-strength = 1;
# blur-background-frame = true;
blur-background-exclude = [
  "name        = 'slop'",
  "window_type = 'desktop'",
  "class_g     = 'slop'",
  "_GTK_FRAME_EXTENTS@:c"
];

############################################
#               OPACITY                    #
############################################
inactive-opacity-override = true;
frame-opacity = 1.0;
# inactive-opacity = 0
# Si tu préfères gérer la transparence via picom (au lieu de Kitty),
# laisse background_opacity de Kitty à 1.0 et utilise ces règles :
opacity-rule = [
  "90:class_g = 'kitty' && focused",
  "90:class_g = 'kitty' && !focused",
  "90:class_g = 'spotify Prenium' && focused",
  "90:class_g = 'spotify Prenium' && !focused",

  # exemples déjà cités, ajuste ou supprime si tu veux homogénéiser
  # "90:class_g = 'Rofi'",
  # "95:class_g = 'Alacritty'",
  # "95:class_g = 'Polybar'"
];

############################################
#                 FADING                   #
############################################
fading = true;
fade-delta = 6;
# fade-in-step = 0.06;
# fade-out-step = 0.06;
fade-exclude = [];

############################################
#                 SHADOWS                  #
############################################
shadow = true;
shadow-radius = 10;
shadow-offset-x = -2;
shadow-offset-y = -2;
shadow-opacity = 0.30;
shadow-red   = 0.0;
shadow-green = 0.0;
shadow-blue  = 0.0;

shadow-exclude = [
  "! name   ~= ''",
  "name      = '[i3 con] workspace 1'",
  "name      = '[i3 con] workspace 2'",
  "name      = '[i3 con] workspace 3'",
  "name      = '[i3 con] workspace 4'",
  "name      = '[i3 con] workspace 5'",
  "name      = '[i3 con] workspace 6'",
  "name      = '[i3 con] workspace 7'",
  "name      = '[i3 con] workspace 8'",
  "name      = '[i3 con] workspace 9'",
  "name      = '[i3 con] workspace 10'",
  "name      = 'bar'",
  "name      = 'Notification'",
  "class_g  ?= 'Notify-osd'",
  "class_g   = 'Conky'",
  "class_g   = 'Polybar'",
  "class_g   = 'Cairo-clock'",
  "class_g   = 'slop'",
  "_GTK_FRAME_EXTENTS@:c"
];

############################################
#            GLX TWEAKS (stables)          #
############################################
glx-copy-from-front = false;
# glx-no-stencil = true;
# glx-use-copysubbuffermesa = true;
# glx-no-rebind-pixmap = true;
# glx-use-gpushader4 = true;
# xrender-sync = true;
# xrender-sync-fence = true;

############################################
#            WINDOW TYPE RULES             #
############################################
wintypes: {
  tooltip    = { fade = true; shadow = true; opacity = 0.75; focus = true; };
  dock       = { shadow = false; };
  dnd        = { shadow = false; };
  popup_menu = { opacity = 0.90; };
}
